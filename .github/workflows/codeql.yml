name: 'CodeQL'

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - feature/*
      - release/*
      - hotfix/*
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect_changes:
    name: Detect changes
    if: ${{ github.event_name == 'pull_request' }}
    uses: ./.github/workflows/detect-changes.yml
    with:
      includeTokensSubmodules: true

  analyze-actions:
    name: Analyze GitHub Actions
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions
          config: |
            paths:
              - '.github/actions'
              - '.github/workflows'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:actions'
          output: sarif-results

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarif-actions
          path: sarif-results
          retention-days: 14

  analyze-android:
    name: Analyze Android Kotlin
    needs: detect_changes
    if: ${{ github.event_name == 'pull_request' && needs.detect_changes.outputs.changed != '' && needs.detect_changes.outputs.changed != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Android environment
        uses: ./.github/actions/prepare-android-env

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual
          config: |
            paths:
              - 'build-system'
              - 'integration-core'
              - 'playground'
              - 'sdds-core'
              - 'third-party/sdds-haze'
              - 'tokens'
            paths-ignore:
              - '**/build/**'
              - '**/.gradle/**'
              - '**/build/generated/**'
              - '**/src/**/generated/**'

      - name: Compile changed modules
        run: ./.github/scripts/run_task.sh assemble '${{ needs.detect_changes.outputs.changed }}' --continue --no-build-cache --rerun-tasks --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:java-kotlin'
          output: sarif-results

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarif-java-kotlin
          path: sarif-results
          retention-days: 14
