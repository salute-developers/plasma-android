name: 'Build tokens apps common'

on:
  workflow_call:
    inputs:
      modules:
        type: string
        description: 'Список модулей в формате json (например, [":tokens:plasma-stards", ":tokens:plasma-stards-compose"])'
        required: true
      ref:
        type: string
        description: 'Название ветки, тэга или хэш коммита'
        required: true
      is_repository_dispatch:
        type: boolean
        description: 'True если workflow вызван через repository_dispatch'
        required: false
        default: false
      release:
        type: boolean
        description: 'Собирать release APK, иначе debug'
        required: false
        default: false
      codeql:
        type: boolean
        description: 'Запустить CodeQL анализ во время сборки APK'
        required: false
        default: false

jobs:
  build:
    name: Build apps
    runs-on: ubuntu-latest
    if: inputs.modules != '' && inputs.modules != '[]' && inputs.ref != ''
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(inputs.modules) }}
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Prepare environment
        uses: ./.github/actions/prepare-android-env

      - name: Initialize CodeQL
        if: inputs.codeql
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual
          config: |
            paths:
              - 'build-system'
              - 'integration-core'
              - 'sdds-core'
              - 'tokens'
            paths-ignore:
              - '**/build/**'
              - '**/.gradle/**'
              - '**/build/generated/**'
              - '**/src/**/generated/**'
              - 'tokens/*/src/main/kotlin/**/tokens/**'
              - 'tokens/*/src/main/kotlin/**/styles/**'
              - 'tokens/*/src/main/kotlin/**/theme/**'
              - 'third-party/sdds-haze'
              - 'playground'

      - name: Extract branch name
        id: extract_branch
        shell: bash
        run: |
          if [[ "${{ inputs.is_repository_dispatch }}" == "true" ]]; then
            echo "branch=main" >> $GITHUB_OUTPUT
          else
            echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
          fi

      - name: Prepare artifact info
        shell: bash
        run: |
          module="${{ matrix.module }}"
          module="${module#:}"
          safe_path="${module//:/\/}"
          build_type="debug"
          if [[ "${{ inputs.release }}" == "true" ]]; then
            build_type="release"
          fi
          codeql_category="${module//:/-}"
          artifact_name="sandbox-${module//:/_}-${build_type}-apk"
          metadata_name="sandbox-${module//:/_}-${build_type}-metadata"
          echo "MODULE_PATH=$safe_path/app" >> $GITHUB_ENV
          echo "SAFE_MODULE=$module" >> $GITHUB_ENV
          echo "CODEQL_MODULE_CATEGORY=$codeql_category" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=$artifact_name" >> $GITHUB_ENV
          echo "METADATA_ARTIFACT_NAME=$metadata_name" >> $GITHUB_ENV
          echo "BUILD_TYPE=$build_type" >> $GITHUB_ENV

      - name: Decrypt Keystore
        if: inputs.release
        run: |
          echo "${{ secrets.KEY_STORE_FILE }}" | base64 -d -i >  ${{ env.MODULE_PATH }}/keystore.jks

      - name: Build APK
        env:
          KEY_STORE_FILE: "keystore.jks"
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.SANDBOX_CMP_RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.SANDBOX_CMP_RELEASE_KEY_PASSWORD }}
        run: |
          task="assembleDebug"
          if [[ "${{ inputs.release }}" == "true" ]]; then
            task="assembleRelease"
          fi
          ./gradlew ${{ matrix.module }}:app:${task} -PbranchName=${{ steps.extract_branch.outputs.branch }}

      - name: Rename APK file
        shell: bash
        run: |
          apk_dir="${{ env.MODULE_PATH }}/build/outputs/apk/${{ env.BUILD_TYPE }}"
          # Находим оригинальный apk файл
          original_apk=$(ls $apk_dir/*.apk | head -n 1)
          # Формируем новое имя
          new_name="app-${{ matrix.module }}-${{ env.BUILD_TYPE }}.apk"
          # Убираем :tokens: и заменяем все точки и подчеркивания на дефисы
          safe_name=$(echo "$new_name" | sed 's/:tokens://' | tr '._' '-')
          # Возвращаем последнюю точку перед расширением
          safe_name="${safe_name%-*}.${safe_name##*-}"
          mv "$original_apk" "$apk_dir/$safe_name"
          echo "RENAMED_APK_PATH=$apk_dir/$safe_name" >> $GITHUB_ENV

      - name: Upload APK
        id: upload_apk
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.RENAMED_APK_PATH }}

      - name: Prepare artifact metadata
        if: success()
        env:
          ARTIFACT_ID: ${{ steps.upload_apk.outputs.artifact-id }}
        shell: bash
        run: |
          mkdir -p artifact-metadata
          artifact_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/$ARTIFACT_ID"
          jq -n \
            --arg module ":${{ env.SAFE_MODULE }}" \
            --arg buildType "${{ env.BUILD_TYPE }}" \
            --arg artifactName "${{ env.ARTIFACT_NAME }}" \
            --arg artifactUrl "$artifact_url" \
            '{
              module: $module,
              buildType: $buildType,
              artifactName: $artifactName,
              artifactUrl: $artifactUrl
            }' > artifact-metadata/artifact.json

      - name: Upload artifact metadata
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.METADATA_ARTIFACT_NAME }}
          path: artifact-metadata/artifact.json

      - name: Stop Gradle daemons before CodeQL
        if: inputs.codeql
        run: ./gradlew --stop

      - name: Perform CodeQL Analysis
        if: inputs.codeql
        timeout-minutes: 20
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:java-kotlin/module:${{ env.CODEQL_MODULE_CATEGORY }}/build:${{ env.BUILD_TYPE }}'
          upload-database: false
          threads: 2
          ram: 6000

      - name: Upload CodeQL diagnostics
        if: failure() && inputs.codeql
        uses: actions/upload-artifact@v4
        with:
          name: codeql-diagnostics-${{ env.CODEQL_MODULE_CATEGORY }}-${{ env.BUILD_TYPE }}
          if-no-files-found: ignore
          path: |
            /home/runner/work/_temp/codeql_databases/java/log/**
            /home/runner/work/_temp/codeql_databases/java/diagnostic/**
            /home/runner/work/_temp/codeql_databases/log/**
            /home/runner/work/_temp/codeql_databases/diagnostic/**
