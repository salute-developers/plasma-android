name: 'Code Quality Check'

on:
  pull_request:
    branches:
      - main
      - develop
      - feature/*
      - release/*
      - hotfix/*

concurrency:
  # New commit on branch cancels running workflows of the same branch
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  detect_changes:
    name: Detect changes
    uses: ./.github/workflows/detect-changes.yml
  lint:
    name: Perform lint analysis
    needs: detect_changes
    runs-on: ubuntu-latest
    if: ${{ join(fromJson(needs.detect_changes.outputs.changed)) != '' }}
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect_changes.outputs.changed) }}
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Prepare environment
        uses: ./.github/actions/prepare-android-env

      - name: Get module dir
        id: module_dir
        run: |
          module="${{ matrix.module }}"
          module="${module#:}"
          safe_path="${module//:/\/}"
          safe_path="$(echo "$safe_path" | tr '\\' '/')"
          echo "dir=$safe_path" >> $GITHUB_OUTPUT

          safe_name="${module//:/-}"
          safe_name="${safe_name//\//-}"
          safe_name="${safe_name//\\/-}"
          echo "name=$safe_name" >> $GITHUB_OUTPUT  

      - name: Run lint
        run: ./.github/scripts/run_task.sh lint '${{ matrix.module }}' --continue --ignore-modules=:sdds-core:plugin_theme_builder,:build-system

      - name: Upload static analysis reports
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint_analysis-${{ steps.module_dir.outputs.name }}
          path: |
            ${{ steps.module_dir.outputs.dir }}/build/reports/**
            !${{ steps.module_dir.outputs.dir }}/build/reports/tests/**
  detekt:
    name: Perform detekt analysis
    needs: detect_changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Prepare environment
        uses: ./.github/actions/prepare-android-env

      - name: Run detekt
        run: ./.github/scripts/run_task.sh detekt '${{ needs.detect_changes.outputs.changed }}' --continue --ignore-modules=:build-system

      - name: Upload static analysis reports
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: detekt_analysis.zip
          path: |
            **/build/reports/**
            !**/build/reports/tests/**

  spotless:
    name: Perform spotless analysis
    needs: detect_changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Prepare environment
        uses: ./.github/actions/prepare-android-env

      - name: Run spotlessCheck
        run: ./.github/scripts/run_task.sh spotlessCheck '${{ needs.detect_changes.outputs.changed }}' --continue --ignore-modules=:build-system

      - name: Upload static analysis reports
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: spotless_analysis.zip
          path: |
            **/build/reports/**
            !**/build/reports/tests/**

  unit-test:
    name: Perform Unit Testing
    runs-on: ubuntu-latest
    needs: detect_changes
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Prepare environment
        uses: ./.github/actions/prepare-android-env

      - name: Run tests
        run: ./.github/scripts/run_task.sh test '${{ needs.detect_changes.outputs.changed }}' --ignore-modules=:tokens --continue

      - name: Upload test reports
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports.zip
          path: | 
            **/build/reports/tests/**
