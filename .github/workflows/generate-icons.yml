name: Update Icons Pack

on:
  workflow_dispatch:
    inputs:
      plasma-ref:
        required: true
        default: master
      plasma-version:
        required: true
  repository_dispatch:
    types: [ build-icons ]

jobs:
  icons:
    runs-on: ubuntu-latest

    steps:
      # делаем сheckout в текущем репозитории
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          show-progress: false
          fetch-depth: 0
          path: current

      # делаем сheckout репозитория plasma
      - name: Checkout to Plasma Web
        uses: actions/checkout@v4
        with:
          repository: salute-developers/plasma
          ref: ${{ github.event.client_payload.ref || github.event.inputs.plasma-ref }}
          show-progress: false
          path: plasma

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: 'plasma/.nvmrc'

      - name: Install plasma web project deps
        working-directory: ./plasma
        run: npm ci

      - name: Generate android icons
        working-directory: ./plasma
        run: |
          npx lerna bootstrap --scope="@salutejs/plasma-icons" --ignore-scripts
          npm run generate:android --prefix="packages/plasma-icons"

      - name: Bump version
        working-directory: ./current
        shell: bash
        run: |
          ./gradlew :sdds-core:icons:bump --info
          ./gradlew :sdds-core:icons-compose:bump --info

      - name: Extract current version
        id: extract_version
        working-directory: ./current
        shell: bash
        run: |
          PROPS=./sdds-core/icons/gradle.properties
          MAJOR=`cat $PROPS | grep "versionMajor" | cut -d'=' -f2`
          MINOR=`cat $PROPS | grep "versionMinor" | cut -d'=' -f2`
          PATCH=`cat $PROPS | grep "versionPatch" | cut -d'=' -f2`
          VER=$MAJOR.$MINOR.$PATCH
          echo $VER
          echo "tag=sdds-icons-v$VER" >> $GITHUB_OUTPUT

      - name: Verify release branch not exists
        working-directory: ./current
        shell: bash
        run: |
          git fetch --all
          if git branch -a | grep -q release/${{ steps.extract_version.outputs.tag }}; then exit 1; else exit 0; fi    

      - name: Create release branch
        working-directory: ./current
        shell: bash
        run: |
          git fetch --all
          git checkout -b release/${{steps.extract_version.outputs.tag}}

      - name: Create version commit
        working-directory: ./current
        shell: bash
        run: |
          git config --local user.email "salutedevs@gmail.com"
          git config --local user.name "Salute Android Team"
          git add ./sdds-core/icons/gradle.properties
          git add ./gradle/icons.version.toml
          git commit -m "feat(sdds-acore/icons): Bump icons version"
          git add ./sdds-core/icons-compose/gradle.properties
          git add ./gradle/icons-compose.version.toml
          git commit -m "feat(sdds-acore/icons-compose): Bump icons-compose version"

      - name: Create drawables folder
        working-directory: ./current
        continue-on-error: true
        run: mkdir -p ./sdds-core/icons/src/main/res/drawable

      - name: Move generated icons to drawable folder
        run: cp -rf plasma/packages/plasma-icons/android-icons/. current/sdds-core/icons/src/main/res/drawable/

      # --- Compose icons (sdds-core:icons-compose) ---
      # Generated from the SAME android-icons/*.xml as the XML module above, so the
      # sets stay in parity. Valkyrie needs JDK 21 (its jars are compiled to class v65).

      - name: Setup Java 21 for Valkyrie
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Valkyrie CLI
        env:
          VALKYRIE_VERSION: '1.2.0'
        run: |
          set -euo pipefail
          curl -fsSL -o valkyrie-cli.zip \
            "https://github.com/ComposeGears/Valkyrie/releases/download/cli-${VALKYRIE_VERSION}/valkyrie-cli-${VALKYRIE_VERSION}.zip"
          unzip -q valkyrie-cli.zip -d valkyrie-cli
          # zip contains a single top-level dir with bin/valkyrie
          VALKYRIE_BIN="$(find "$PWD/valkyrie-cli" -type f -name valkyrie -path '*/bin/*' | head -1)"
          chmod +x "$VALKYRIE_BIN"
          echo "VALKYRIE_BIN=$VALKYRIE_BIN" >> "$GITHUB_ENV"

      - name: Prepare and filter Compose icons input
        run: |
          set -euo pipefail
          # Work on a COPY: the XML drawable set must keep both variants of each
          # collision pair; only the Compose input is filtered.
          rm -rf compose-icons-input
          cp -rf plasma/packages/plasma-icons/android-icons compose-icons-input
          current/.github/scripts/filter-compose-icon-collisions.sh compose-icons-input

      - name: Clean previously generated Compose icons
        run: |
          set -euo pipefail
          PKG=current/sdds-core/icons-compose/src/commonMain/kotlin/com/sdds/icons/compose
          mkdir -p "$PKG"
          # remove stale generated icons but keep the hand-written receiver object
          find "$PKG" -maxdepth 1 -type f -name '*.kt' ! -name 'SddsIcons.kt' -delete

      - name: Generate Compose icons (Valkyrie)
        # No continue-on-error: Valkyrie exits non-zero on an unhandled
        # case-insensitive collision, which MUST fail the run (fail-fast) rather
        # than silently skip icons.
        run: |
          set -euo pipefail
          "$VALKYRIE_BIN" svgxml2imagevector \
            --input-path "$PWD/compose-icons-input" \
            --output-path current/sdds-core/icons-compose/src/commonMain/kotlin/com/sdds/icons/compose \
            --package-name com.sdds.icons.compose \
            --iconpack-name SddsIcons \
            --output-format lazy-property \
            --explicit-mode true \
            --use-path-data-string true

      - name: Create tag and release pull request
        working-directory: ./current
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG=${{steps.extract_version.outputs.tag}}
          PLASMA_VER=${{ github.event.client_payload.version || github.event.inputs.plasma-version }}
          git add ./sdds-core/icons/
          git commit -m "feat(sdds-acore/icons): New xml icons were added from plasma v$PLASMA_VER"
          git add ./sdds-core/icons-compose/
          git commit -m "feat(sdds-acore/icons-compose): New compose icons were added from plasma v$PLASMA_VER"
          git push --set-upstream origin release/$TAG
          gh pr create --base main --head release/$TAG --title "Release $TAG" --body "Icons were updated to v$PLASMA_VER"
