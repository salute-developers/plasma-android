schema: spec-driven

context: |
  System Overview & Domain:
  - `sdds-android` is a Kotlin/Android monorepo for the Salute Design System on Android.
  - The repository contains core UI libraries, Compose and View implementations, token packages for multiple brands/products, Gradle build tooling, docs generators, playground apps, and integration sandboxes.
  - The repo is organized as a composite Gradle build with included builds: `build-system`, `sdds-core`, `integration-core`, `tokens`, `playground`, and `third-party/sdds-haze`.

  Technical Stack & Versions:
  - Android libraries and apps on Kotlin `2.1.10`, Android Gradle Plugin `8.8.2`, compileSdk `35`, targetSdk `35`, minSdk `24`.
  - UI stacks: Android Views and Jetpack Compose. Compose uses BOM `2025.05.00`; Compose Multiplatform plugin `1.7.3` is present in the build.
  - Build system: Gradle composite build with custom conventions and plugins from `build-system`.
  - Code generation / compiler tooling: KSP `2.1.10-1.0.31`, KotlinPoet `1.12.0`, Kotlin serialization JSON `1.4.0`.
  - Async/runtime libraries: Kotlin coroutines `1.6.1`.
  - Android dependencies include AndroidX Core `1.7.0`, AppCompat `1.3.1`, Navigation `2.7.2`, ConstraintLayout `2.1.4`, Lifecycle `2.4.1`, Material `1.3.0`.
  - Media/UI helpers include Coil Compose `2.2.0`, Glide `4.16.0`, RedMadRobot Input Mask `7.2.6`.
  - Documentation/publishing: Dokka `1.8.20`, Vanniktech Maven Publish `0.29.0`, Nexus Publish `1.3.0`.
  - Static analysis / formatting: Detekt `1.22.0`, KtLint `0.50.0`, Spotless `6.20.0`, Android Lint `31.1.4`.
  - Testing: JUnit 4 `4.13.2`, AndroidX test ext JUnit `1.1.5`, Espresso `3.4.0`, Robolectric `4.10`, MockK `1.14.2`, Roborazzi `1.44.0`, AssertK `0.28.1`.

  Project Structure:
  - `build-system`: shared Gradle conventions, custom plugins/tasks, detekt rules, documentation templates.
  - `sdds-core`: core deliverables such as `uikit`, `uikit-compose`, `icons`, docs modules, and `plugin_theme_builder`.
  - `integration-core`: fixture, testcase, and sandbox modules for integration validation.
  - `tokens`: brand/product-specific token modules for Compose and View stacks.
  - `playground`: local development and manual QA apps/tools.
  - `third-party/sdds-haze`: vendored third-party included build maintained in-repo.

  Architectural Patterns & Constraints:
  - Treat the repository as a multi-module platform repo: prefer narrow changes scoped to one included build or module unless the task explicitly spans multiple parts.
  - `build-system` changes are infrastructural and can affect every included build; validate them carefully.
  - Avoid editing generated artifacts, build outputs, `.gradle`, or other derived files unless the task explicitly requires it.
  - Prefer working from the repository root and use the root `./gradlew`.
  - CI uses JDK 17.

  Validation & Delivery:
  - Full local validation commands from repo root:
    - `./gradlew testAll`
    - `./gradlew detektAll`
    - `./gradlew spotlessApplyAll`
  - For focused work, prefer module-level tasks such as `:sdds-core:uikit:test`, `:sdds-core:uikit:detekt`, and `:sdds-core:uikit:spotlessApply`.

  Coding Standards:
  - Follow `CONTRIBUTING.md`.
  - Repository documentation and team-facing descriptions may be written in Russian; keep the language consistent with the surrounding file and existing project materials.
  - Use Conventional Commits with repo-specific scopes; commit messages must be in English.
  - When changing public APIs, public components, extension points, Gradle plugins, or code used for generated docs, add or update relevant KDoc and keep it aligned with the implementation.
  - New `TODO` comments must include a link to a GitHub issue.

rules:
  proposal:
    - Write proposals in Russian unless the surrounding artifact set is already in English.
    - Reference the affected included builds and modules explicitly, for example `sdds-core`, `tokens`, `build-system`, or `playground`.
    - State whether the change affects public API, tokens, docs generation, or Gradle conventions.
    - For cross-module or infrastructural changes, include impact and validation scope.
  design:
    - Write design in Russian unless the surrounding artifact set is already in English.
    - Keep the design aligned with the composite Gradle structure of this repository.
    - Prefer narrow module-scoped solutions; justify any change that spans multiple included builds.
    - Call out required KDoc or documentation updates for public APIs, public components, plugins, and generated docs.
    - Mention validation commands needed for the touched modules or for the whole repository.
  tasks:
    - Write tasks in Russian unless the change set is already maintained in English.
    - Group tasks by included build or module so execution scope is obvious.
    - Include validation tasks using Gradle commands from the repository root.
    - Add explicit documentation/KDoc update tasks when public API or docs-facing behavior changes.
